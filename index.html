<!DOCTYPE html>
<!-- Define que usamos HTML5 -->

<html lang="es">
<!-- Idioma del sitio -->

<head>
    <meta charset="UTF-8">
    <!-- Permite usar caracteres como ñ y tildes -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que el sitio sea responsive en celulares -->

    <title>Practica Store</title>
    <!-- Título que aparece en la pestaña -->
</head>

<body>

    <!-- ===== ENCABEZADO ===== -->
    <header>
        <h1>Store</h1>
        <!-- Nombre principal del sitio -->

        <nav>
            <!-- Menú de navegación -->
            <a href="#">Inicio</a>
            <a href="#">Productos</a>
            <a href="#">Carrito</a>
            <a href="#">Login</a>
        </nav>
    </header>

    <!-- ===== CONTENIDO PRINCIPAL ===== -->
    <main>

        <!-- Sección de productos -->
        <section>
            <h2>Productos destacados</h2>

            <!-- Producto individual -->
            <article>
                <h3>Taladro</h3>
                <!-- Nombre del producto -->

                <p>$200.000</p>
                <!-- Precio -->

                <button>Ver más</button>
                <!-- Botón de acción -->
            </article>
            
            <br> <! -- para salto de linea>

            <!-- Otro producto -->
            <article>
                <h3>Martillo</h3>
                <p>$50.000</p>
                <button>Ver más</button>
            </article>

        </section>

        <!-- Sección informativa -->
        <section>
            <h2>Sobre nosotros</h2>
            <p>Somos una empresa vacana</p>
        </section>

    </main>

    <!-- ===== PIE DE PÁGINA ===== -->
    <footer>
        <p>© 2026 Practica</p>
    </footer>

</body>

</html>
